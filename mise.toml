[tools]
python = "3.14"
uv = "latest"
git-cliff = "latest"
markdownlint-cli2 = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[hooks]
enter = "bash ./scripts/enter-project-hook.sh"

[env]
_.file = '.env'       # for sensitive data
UV_LINK_MODE = "copy"

[tasks.docs]
run = "zensical serve"
description = "Serve the documentation locally"

[tasks.check]
run = "uv run ty check packages"
description = "Run type checking"

[tasks.sync-cuda]
run = "uv sync --extra cuda --all-groups"
description = "Run uv sync for devs"

[tasks.test]
run = "uv run pytest packages/corridorkey-core/tests packages/corridorkey/tests"
description = "Run fast tests for all packages (slow, GPU, and MLX skipped by default)"

[tasks.test-slow]
run = "uv run pytest packages/corridorkey-core/tests packages/corridorkey/tests --run-slow"
description = "Run all CPU tests including slow model forward pass tests"

[tasks.test-gpu]
run = "uv run pytest packages/corridorkey-core/tests packages/corridorkey/tests --run-gpu"
description = "Run GPU tests (requires CUDA)"

[tasks.test-cov]
run = "uv run pytest packages/corridorkey-core/tests packages/corridorkey/tests --cov=corridorkey_core --cov=corridorkey --cov-report=term-missing --cov-fail-under=75"
description = "Run fast tests with coverage report for all packages (fails under 75%)"

[tasks.check-ascii]
run = "uv run python scripts/check_ascii.py"
description = "Check for non-ASCII characters in docs and source files"

[tasks.profile]
run = "uv run --project packages/corridorkey-core python scripts/profile_engine.py"
description = "Profile inference engine (requires CUDA + CK_CHECKPOINT_PATH env var)"
