[project]
site_name = "CorridorKey"
site_description = "AI Green Screen Keyer by Corridor Digital"
repo_name = "nikopueringer/CorridorKey"
repo_url = "https://github.com/nikopueringer/CorridorKey"
extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

nav = [
  { Home = "index.md" },
  { Guide = [
    { "Overview" = "guide/index.md" },
    { "Installation" = "guide/installation.md" },
    { "First Run" = "guide/first-run.md" },
    { "Preparing Clips" = "guide/preparing-clips.md" },
    { "Processing Clips (Wizard)" = "guide/processing.md" },
    { "Outputs" = "guide/outputs.md" },
    { "Troubleshooting" = "guide/troubleshooting.md" },
  ] },
  { Knowledge = [
    { "Overview" = "knowledge/index.md" },
    { "Pipeline" = [
      { "Overview" = "knowledge/pipeline/index.md" },
      { "Alpha Matting" = "knowledge/pipeline/alpha-matting.md" },
      { "Colour Space" = "knowledge/pipeline/colour-space.md" },
      { "Green Spill" = "knowledge/pipeline/green-spill.md" },
      { "The Neural Network" = "knowledge/pipeline/neural-network.md" },
    ] },
    { "Configuration" = "knowledge/configuration/index.md" },
  ] },
  { Developer = [
    { "Overview" = "dev/index.md" },
    { "Setup" = "dev/setup/index.md" },
    { "Testing" = [
      { "Overview" = "dev/testing/index.md" },
      { "Unit Tests" = "dev/testing/unit-tests.md" },
      { "Integration Tests" = "dev/testing/integration-tests.md" },
      { "Property-Based Tests" = "dev/testing/property-tests.md" },
      { "Hardware-Gated Tests" = "dev/testing/hardware-gated.md" },
    ] },
    { "Contributing" = [
      { "Overview" = "dev/contributing/index.md" },
      { "Naming Conventions" = "dev/contributing/naming-conventions.md" },
      { "Authoring Documentation" = "dev/contributing/authoring-documentation.md" },
      { "Documentation Principles" = [
        { "Overview" = "dev/contributing/documentation-principles/index.md" },
        { "Principle 1" = "dev/contributing/documentation-principles/principle-1-no-fiction.md" },
        { "Principle 2" = "dev/contributing/documentation-principles/principle-2-single-responsibility.md" },
        { "Principle 3" = "dev/contributing/documentation-principles/principle-3-scale-by-folders.md" },
        { "Principle 4" = "dev/contributing/documentation-principles/principle-4-link-to-code.md" },
        { "Principle 5" = "dev/contributing/documentation-principles/principle-5-format-style.md" },
        { "Principle 6" = "dev/contributing/documentation-principles/principle-6-structure-uniformity.md" },
      ] },
    ] },
  ] },
  { "corridorkey" = [
    { "Overview" = "corridorkey/index.md" },
    { "Integration" = [
      { "Overview" = "corridorkey/integration/index.md" },
      { "Startup" = "corridorkey/integration/startup.md" },
      { "Runner" = "corridorkey/integration/runner.md" },
      { "Frame Loop" = "corridorkey/integration/frame-loop.md" },
      { "Events" = "corridorkey/integration/events.md" },
      { "Error Handling" = "corridorkey/integration/error-handling.md" },
    ] },
    { "Pipeline" = [
      { "Overview" = "corridorkey/pipeline/index.md" },
      { "Scanner" = "corridorkey/pipeline/scanner.md" },
      { "Loader" = "corridorkey/pipeline/loader.md" },
      { "Preprocessor" = "corridorkey/pipeline/preprocessor.md" },
      { "Inference" = "corridorkey/pipeline/inference.md" },
      { "Postprocessor" = "corridorkey/pipeline/postprocessor.md" },
      { "Writer" = "corridorkey/pipeline/writer.md" },
