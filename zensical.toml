      { "Authoring Documentation" = "dev/contributing/authoring-documentation.md" },
      { "Documentation Principles" = [
        { "Overview" = "dev/contributing/documentation-principles/index.md" },
        { "Principle 1" = "dev/contributing/documentation-principles/principle-1-no-fiction.md" },
        { "Principle 2" = "dev/contributing/documentation-principles/principle-2-single-responsibility.md" },
        { "Principle 3" = "dev/contributing/documentation-principles/principle-3-scale-by-folders.md" },
        { "Principle 4" = "dev/contributing/documentation-principles/principle-4-link-to-code.md" },
        { "Principle 5" = "dev/contributing/documentation-principles/principle-5-format-style.md" },
        { "Principle 6" = "dev/contributing/documentation-principles/principle-6-structure-uniformity.md" },
      ] },
    ] },
  ] },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
accent = "deep orange"
primary = "orange"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
accent = "deep orange"
primary = "orange"

[project.theme.icon]
logo = "lucide/drama"
next = "lucide/arrow-right"
previous = "lucide/arrow-left"
repo = "lucide/github"
search = "lucide/search"
top = "lucide/arrow-up"
edit = "lucide/file-pen-line"
view = "lucide/file-braces-corner"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src", "packages/corridorkey/src", "packages/corridorkey-cli/src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
merge_init_into_class = true
