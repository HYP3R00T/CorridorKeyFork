    { "Clip State Machine" = "corridorkey/clip-state.md" },
    { "Job Queue" = "corridorkey/job-queue.md" },
    { "Configuration" = "corridorkey/configuration.md" },
    { "Reference" = [
      { "Overview" = "corridorkey/reference/index.md" },
      { "pipeline" = "corridorkey/reference/pipeline.md" },
      { "clip-state" = "corridorkey/reference/clip-state.md" },
      { "job-queue" = "corridorkey/reference/job-queue.md" },
      { "errors" = "corridorkey/reference/errors.md" },
      { "events" = "corridorkey/reference/events.md" },
      { "device-utils" = "corridorkey/reference/device-utils.md" },
      { "model-hub" = "corridorkey/reference/model-hub.md" },
      { "configuration" = "corridorkey/reference/configuration.md" },
    ] },
  ] },
  { "corridorkey-cli" = [
    { "Overview" = "corridorkey-cli/index.md" },
    { "Commands" = "corridorkey-cli/commands.md" },
    { "Architecture" = "corridorkey-cli/architecture.md" },
    { "Reference" = [
      { "Overview" = "corridorkey-cli/reference/index.md" },
      { "wizard" = "corridorkey-cli/reference/wizard.md" },
      { "init" = "corridorkey-cli/reference/init.md" },
      { "config" = "corridorkey-cli/reference/config.md" },
      { "reset" = "corridorkey-cli/reference/reset.md" },
    ] },
  ] },
]

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
accent = "deep orange"
primary = "orange"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
accent = "deep orange"
primary = "orange"

[project.theme.icon]
logo = "lucide/drama"
next = "lucide/arrow-right"
previous = "lucide/arrow-left"
repo = "lucide/github"
search = "lucide/search"
top = "lucide/arrow-up"
edit = "lucide/file-pen-line"
view = "lucide/file-braces-corner"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src", "packages/corridorkey/src", "packages/corridorkey-cli/src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
merge_init_into_class = true
