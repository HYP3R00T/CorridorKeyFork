        { "model-hub" = "dev/api/corridorkey/model-hub.md" },
        { "configuration" = "dev/api/corridorkey/configuration.md" },
      ] },
      { "corridorkey-cli" = [
        { "Overview" = "dev/api/corridorkey-cli/index.md" },
        { "wizard" = "dev/api/corridorkey-cli/wizard.md" },
        { "init" = "dev/api/corridorkey-cli/init.md" },
        { "config" = "dev/api/corridorkey-cli/config.md" },
        { "reset" = "dev/api/corridorkey-cli/reset.md" },
      ] },
    ] },
    { "Testing" = [
      { "Overview" = "dev/testing/index.md" },
      { "Unit Tests" = "dev/testing/unit-tests.md" },
      { "Integration Tests" = "dev/testing/integration-tests.md" },
      { "Property-Based Tests" = "dev/testing/property-tests.md" },
      { "Hardware-Gated Tests" = "dev/testing/hardware-gated.md" },
    ] },
    { "Contributing" = [
      { "Overview" = "dev/contributing/index.md" },
