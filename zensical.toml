[project]
site_name = "CorridorKey"
site_description = "AI Green Screen Keyer by Corridor Digital"
repo_name = "nikopueringer/CorridorKey"
repo_url = "https://github.com/nikopueringer/CorridorKey"
extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

nav = [
  { Home = "index.md" },
  { Guide = [
    { "Overview" = "guide/index.md" },
    { "Installation" = "guide/installation.md" },
    { "First Run" = "guide/first-run.md" },
    { "Preparing Clips" = "guide/preparing-clips.md" },
    { "Processing Clips (Wizard)" = "guide/processing.md" },
    { "Outputs" = "guide/outputs.md" },
    { "Troubleshooting" = "guide/troubleshooting.md" },
  ] },
  { Knowledge = [
    { "Overview" = "knowledge/index.md" },
    { "Pipeline" = [
      { "Overview" = "knowledge/pipeline/index.md" },
      { "Alpha Matting" = "knowledge/pipeline/alpha-matting.md" },
      { "Colour Space" = "knowledge/pipeline/colour-space.md" },
      { "Green Spill" = "knowledge/pipeline/green-spill.md" },
      { "The Neural Network" = "knowledge/pipeline/neural-network.md" },
    ] },
    { "Configuration" = "knowledge/configuration/index.md" },
  ] },
  { Developer = [
    { "Overview" = "dev/index.md" },
    { "Setup" = "dev/setup/index.md" },
    { "Packages" = [
      { "corridorkey" = [
        { "Overview" = "dev/packages/corridorkey/index.md" },
        { "Clip State Machine" = "dev/packages/corridorkey/clip-state.md" },
        { "Job Queue" = "dev/packages/corridorkey/job-queue.md" },
        { "Configuration" = "dev/packages/corridorkey/configuration.md" },
        { "Interface" = [
          { "Overview" = "dev/packages/corridorkey/interface/index.md" },
          { "Startup" = "dev/packages/corridorkey/interface/startup.md" },
          { "PipelineRunner" = "dev/packages/corridorkey/interface/pipeline-runner.md" },
          { "MultiGPURunner" = "dev/packages/corridorkey/interface/multi-gpu-runner.md" },
          { "Frame Loop" = "dev/packages/corridorkey/interface/frame-loop.md" },
          { "Events" = "dev/packages/corridorkey/interface/events.md" },
          { "Error Handling" = "dev/packages/corridorkey/interface/error-handling.md" },
        ] },
        { "Stages" = [
          { "Overview" = "dev/packages/corridorkey/stages/index.md" },
          { "Scanner" = "dev/packages/corridorkey/stages/scanner.md" },
          { "Loader" = "dev/packages/corridorkey/stages/loader.md" },
          { "Preprocessor" = "dev/packages/corridorkey/stages/preprocessor.md" },
          { "Inference" = "dev/packages/corridorkey/stages/inference.md" },
          { "Postprocessor" = "dev/packages/corridorkey/stages/postprocessor.md" },
          { "Writer" = "dev/packages/corridorkey/stages/writer.md" },
        ] },
      ] },
      { "corridorkey-cli" = [
        { "Overview" = "dev/packages/corridorkey-cli/index.md" },
        { "Commands" = "dev/packages/corridorkey-cli/commands.md" },
      ] },
    ] },
    { "API Reference" = [
      { "corridorkey" = [
        { "Overview" = "dev/api/corridorkey/index.md" },
        { "pipeline" = "dev/api/corridorkey/pipeline.md" },
        { "clip-state" = "dev/api/corridorkey/clip-state.md" },
        { "job-queue" = "dev/api/corridorkey/job-queue.md" },
        { "errors" = "dev/api/corridorkey/errors.md" },
        { "events" = "dev/api/corridorkey/events.md" },
