[project]
name = "corridorkey-core"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.13"
readme = "README.md"
authors = [{ name = "Corridor Digital" }]
maintainers = [{ name = "Rajesh Das", email = "rajesh@hyperoot.dev" }]
dependencies = [
  "torch==2.10.0",
  "torchvision==0.25.0",
  "opencv-python>=4.13.0.92",
  "openexr>=3.4.6",
  "timm>=1.0.25",
  "utilityhub-config>=0.2.3",
]

[project.optional-dependencies]
cuda = ["torch==2.10.0", "torchvision==0.25.0"]

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
timm = { git = "https://github.com/Raiden129/pytorch-image-models-fix", branch = "fix/hiera-flash-attention-global-4d" }
torch = [{ index = "pytorch", extra = "cuda" }]
torchvision = [{ index = "pytorch", extra = "cuda" }]

[project.scripts]
corridorkey-core = "corridorkey_core:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
